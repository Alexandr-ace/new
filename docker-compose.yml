version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wb_parser_db
    restart: always
    environment:
      POSTGRES_USER: parser_user
      POSTGRES_PASSWORD: parser_password
      POSTGRES_DB: wb_products
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: